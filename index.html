<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>To-do</title>
  </head>
  <body>
    <h1>To-do list</h1>
    <div class="content">
      <div class="name-list">
        <h3>Tareas</h3>
        <button id="add-task">+</button>
      </div>
      <ul id="task-list"></ul>
    </div>

    <dialog id="dialog-tasks">
      <h3 id="dialog-title"></h3> 
      <textarea id="task-input" rows="4"></textarea>
      <div id="foot-dialog">
        <button class="button-dialog" id="cancel">cancel</button>
        <button class="button-dialog" id="confirm">confirm</button>
      </div>
    </dialog>

    <script type="module" src="/src/renderer.js"></script>
  </body>
</html>
